version: '3.8'

services:
  # --- DATABASES ---
  oracle-primary:
    image: gvenzl/oracle-free:23-slim
    environment:
      - ORACLE_PASSWORD=oracle
    volumes:
      - ./oracle-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "1521:1521"
#    healthcheck:
#      test: ["CMD", "healthcheck.sh"]
#      interval: 10s
#      timeout: 5s
#      retries: 5

  oracle-standby:
    image: gvenzl/oracle-free:23-slim
    environment:
      - ORACLE_PASSWORD=oracle
    ports:
      - "1522:1521"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mydb
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  # --- CONSENSUS CLUSTER ---
  # --- CONSENSUS CLUSTER (Production 3-Node Setup) ---
  consul-server1:
    image: hashicorp/consul:1.17
    # We use -retry-join so they continuously look for each other until the cluster forms
    command: "agent -server -ui -node=server-1 -bootstrap-expect=3 -client=0.0.0.0 -retry-join=consul-server2 -retry-join=consul-server3"
    ports:
      - "8500:8500"

  consul-server2:
    image: hashicorp/consul:1.17
    command: "agent -server -node=server-2 -client=0.0.0.0 -retry-join=consul-server1 -retry-join=consul-server3"

  consul-server3:
    image: hashicorp/consul:1.17
    command: "agent -server -node=server-3 -client=0.0.0.0 -retry-join=consul-server1 -retry-join=consul-server2"

  # --- CHAOS ENGINE ---
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.7.0
    ports:
      - "8474:8474"
      - "15210:15210"
      - "54320:54320"

  # --- OBSERVABILITY ---
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    environment:
      # Hardcode the login credentials
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Disable the annoying "New version available" prompts
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    ports:
      - "3000:3000"

  # --- THE BILINGUAL APPS ---
  app1-websphere:
    build:
      context: .
      dockerfile: app1-websphere/Dockerfile
    environment:
      - CONSUL_HTTP_ADDR=consul-server1:8500
    ports:
      - "9080:9080"
    depends_on:
      oracle-primary:
        condition: service_started
      postgres:
        condition: service_started
      consul-server1:
        condition: service_started

  app2-springboot:
    build:
      context: .
      dockerfile: app2-springboot/Dockerfile
    environment:
      - CONSUL_HTTP_ADDR=consul-server1:8500
    ports:
      - "8082:8082"
    depends_on:
      oracle-primary:
        condition: service_started
      postgres:
        condition: service_started
      consul-server1:
        condition: service_started

  cdc-worker:
    build:
      context: .
      dockerfile: cdc-worker/Dockerfile
    environment:
      - CONSUL_HTTP_ADDR=consul-server1:8500
    depends_on:
      oracle-primary:
        condition: service_started
      postgres:
        condition: service_started
      consul-server1:
        condition: service_started